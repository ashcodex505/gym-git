# GENERATED by `python -m irongraph.formgen` from the exercise registry —
# edit data/registry/*.json (or add exercises in the dashboard) instead of
# editing this file; it is rewritten on every workout commit.
# Submitting this form triggers process-workout.yml immediately.
name: 🏋️ Log a workout
description: Every exercise pre-listed — just add numbers next to what you did.
title: 🏋️ Workout Log
labels:
- daily-quest
- log-workout
assignees:
- ashcodex505
body:
- type: markdown
  attributes:
    value: |-
      Every exercise is listed below, ready to log. **Type your numbers after the ones you did** — e.g. `Barbell Bench Press: 185 lb x 6, 185 x 5` or `Treadmill: 30 min, speed 3, incline 12`.
      Leave everything else untouched (blank lines are ignored — no need to delete them). Sets are comma-separated; `185x6x3` = 3 sets; `// text` adds a note.
- type: textarea
  id: strength
  attributes:
    label: 🏋️ Strength
    description: weights & reps — numbers only next to what you trained
    value: |
      # Chest
      Barbell Bench Press:
      Cable Fly:
      Chest Press Machine:
      Dips:
      Dumbbell Bench Press:
      Incline Bench Press:
      Incline Dumbbell Press:
      Pec Deck:
      Push-ups:

      # Back
      Barbell Row:
      Chin-ups:
      Deadlift:
      Dumbbell Row:
      Inverted Row:
      Lat Pulldown:
      Pull-ups:
      Seated Cable Row:
      T-Bar Row:

      # Shoulders
      Arnold Press:
      Dumbbell Shoulder Press:
      Face Pull:
      Lateral Raise:
      Overhead Press:
      Rear Delt Fly:

      # Biceps
      Barbell Curl:
      Dumbbell Curl:
      Hammer Curl:
      Preacher Curl:

      # Triceps
      Close-Grip Bench Press:
      Overhead Tricep Extension:
      Skull Crushers:
      Tricep Pushdown:

      # Legs
      Back Squat:
      Bulgarian Split Squat:
      Calf Raise:
      Front Squat:
      Leg Curl:
      Leg Extension:
      Leg Press:
      Romanian Deadlift:

      # Glutes
      Hip Thrust:
  validations:
    required: false
- type: textarea
  id: cardio
  attributes:
    label: 🏃 Cardio
    description: duration / distance / speed / incline / level
    value: |
      # Cardio
      Cycling:
      Elliptical:
      Incline Treadmill:
      Outdoor Run:
      Rowing:
      StairMaster:
      Swimming:
      Walking:
  validations:
    required: false
- type: textarea
  id: core
  attributes:
    label: 🧱 Core & bodyweight
    description: 'weighted, reps-only, or timed (e.g. Plank: 2m15s)'
    value: |
      # Core
      Ab Machine Crunch:
      Ab Wheel:
      Cable Crunch:
      Decline Ab Crunches:
      Hanging Leg Raise:
      Plank:
      Russian Twist:
      Weighted Sit-up:
  validations:
    required: false
- type: textarea
  id: notes
  attributes:
    label: Session notes
    description: optional — how it felt
    value: ''
  validations:
    required: false
