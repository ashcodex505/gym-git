# Turns a completed quest issue into a verified, human-authored commit.
#
# Trigger: closing a daily-quest issue (normal path) or applying the
# `log-workout` label (lets you log without closing, e.g. to re-run after
# a fix). Ingestion is idempotent — the issue number is the durable key,
# so re-runs and double-triggers can never record a workout twice.
#
# Security notes:
# - issue body is written to a file and parsed in Python; it never touches
#   a shell and never becomes a command argument
# - permissions are least-privilege (contents+issues write only)
# - concurrency group serializes ingestion so two closes can't race a push
name: Process Workout

on:
  issues:
    types: [closed, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Quest issue number to (re)process"
        required: true
        type: string

permissions:
  contents: write
  issues: write

concurrency:
  group: process-workout
  cancel-in-progress: false

jobs:
  ingest:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.issue.labels.*.name, 'daily-quest') &&
       (github.event.action == 'closed' ||
        (github.event.action == 'labeled' && github.event.label.name == 'log-workout')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install IronGraph
        run: pip install -q pyyaml

      # The body always comes from the API (not the event payload): it's
      # identical for event runs and it's the only source for manual runs —
      # plus it picks up edits made after the triggering event. It is
      # written straight to a file and parsed in Python; never near a shell.
      - name: Resolve issue and fetch body
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          N="${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}"
          gh api "repos/${{ github.repository }}/issues/$N" > /tmp/issue.json
          python - <<'PY'
          import json, os
          d = json.load(open("/tmp/issue.json"))
          open("/tmp/issue_body.md", "w").write(d.get("body") or "")
          labels = [lb["name"] for lb in d["labels"]]
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"number={d['number']}\n")
              f.write(f"url={d['html_url']}\n")
              f.write(f"is_quest={'true' if 'daily-quest' in labels else 'false'}\n")
          PY

      - name: Guard non-quest issues (manual runs)
        if: steps.issue.outputs.is_quest != 'true'
        run: |
          echo "::error::Issue #${{ steps.issue.outputs.number }} has no daily-quest label — refusing to ingest an arbitrary issue."
          exit 1

      - name: Extract quest date from issue body
        id: qdate
        run: |
          DATE=$(grep -oE 'irongraph:quest date=[0-9-]+' /tmp/issue_body.md | head -1 | cut -d= -f2 || true)
          if [ -z "$DATE" ]; then DATE=$(TZ=America/Phoenix date +%Y-%m-%d); fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

      - name: Ingest workout
        id: ingest
        continue-on-error: true
        run: |
          python -m irongraph.ingest \
            --issue-number "${{ steps.issue.outputs.number }}" \
            --issue-body-file /tmp/issue_body.md \
            --issue-url "${{ steps.issue.outputs.url }}" \
            --date "${{ steps.qdate.outputs.date }}" \
            --summary-file /tmp/summary.json
          echo "code=$?" >> "$GITHUB_OUTPUT"

      - name: Read result
        id: result
        run: |
          STATUS=$(python -c "import json;print(json.load(open('/tmp/summary.json'))['status'])" 2>/dev/null || echo error)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Commit workout (authored by the human, verified)
        if: steps.result.outputs.status == 'ok'
        run: |
          python - <<'PY'
          import json
          s = json.load(open("/tmp/summary.json"))
          open("/tmp/subject.txt", "w").write(s["commit_subject"])
          open("/tmp/body.txt", "w").write(s["commit_body"])
          PY
          python -m irongraph.gitcommit --subject-file /tmp/subject.txt --body-file /tmp/body.txt
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Comment success
        if: steps.result.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          s = json.load(open("/tmp/summary.json"))
          lines = ["## ⚔️ Quest complete!", "",
                   f"Recorded **{s['entries']} exercise(s)** for {s['date']} and committed as "
                   f"**Ashish Kurse** — this workout is now part of your Git history."]
          if s["prs"]:
              lines += ["", "### 🏆 New personal records"]
              for p in s["prs"]:
                  extra = f" ({p['delta']} vs {p['previous']})" if p.get("delta") else ""
                  lines.append(f"- **{p['exercise']}** — {p['display']}{extra}")
          if s["achievements"]:
              lines += ["", "### 🏅 Achievements unlocked"]
              lines += [f"- {a['emoji']} **{a['name']}**" for a in s["achievements"]]
          xp = sum(s["xp"].values())
          lines += ["", f"**+{xp} XP** → Level {s['level']} {s['title']}"]
          if s.get("new_custom_exercises"):
              lines += ["", f"🆕 Added custom exercise(s): {', '.join(s['new_custom_exercises'])}"]
          open("/tmp/comment.md", "w").write("\n".join(lines))
          PY
          gh issue comment "${{ steps.issue.outputs.number }}" --body-file /tmp/comment.md
          gh issue edit "${{ steps.issue.outputs.number }}" --remove-label awaiting-log,needs-fix 2>/dev/null || true

      - name: Comment validation problems and reopen
        if: steps.result.outputs.status == 'invalid'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          s = json.load(open("/tmp/summary.json"))
          lines = ["## ⚠️ Quest not recorded yet", "",
                   "Your entries are safe in this issue — nothing was lost, and no bad data was committed.",
                   "Here's what needs fixing:", ""]
          lines += [f"- {p}" for p in s["problems"]]
          lines += ["", "Fix the lines above (edit this issue), then **close it again** or "
                    "re-apply the `log-workout` label to retry."]
          open("/tmp/comment.md", "w").write("\n".join(lines))
          PY
          gh issue comment "${{ steps.issue.outputs.number }}" --body-file /tmp/comment.md
          gh issue reopen "${{ steps.issue.outputs.number }}" 2>/dev/null || true
          gh issue edit "${{ steps.issue.outputs.number }}" --add-label needs-fix 2>/dev/null || true

      - name: Fail loudly on unexpected error
        if: steps.result.outputs.status == 'error'
        run: |
          echo "::error::Ingestion crashed without producing a summary — see the Ingest step log."
          exit 1

      - name: Comment duplicate (idempotency)
        if: steps.result.outputs.status == 'duplicate'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --body "💤 This quest was already recorded — duplicate processing skipped (idempotent by issue number)."
