# Creates the nightly workout quest issue.
#
# 21:00 America/Phoenix â€” Arizona never observes DST, so local time is a
# constant UTC-7 and these cron entries are exact year-round. On-the-hour
# slots are GitHub's most congested, so two off-hour fallbacks follow
# closely; dedupe guarantees only one quest per day either way.
name: Daily Quest

on:
  schedule:
    # Primary + two fallbacks: GitHub's cron scheduler can skip or delay
    # runs (especially a workflow's first ever occurrence, and under
    # load). The dedupe step makes retries free â€” at most ONE quest issue
    # per day is ever created â€” so extra slots only add reliability.
    - cron: "0 4 * * *"    # 21:00 America/Phoenix (primary)
    - cron: "13 4 * * *"   # 21:13 fallback (off-hour = more reliable)
    - cron: "43 4 * * *"   # 21:43 last-chance fallback
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

concurrency:
  group: daily-quest
  cancel-in-progress: false

jobs:
  create-quest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install IronGraph
        run: pip install -q pyyaml

      - name: Skip if today's quest already exists
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=America/Phoenix date +%Y-%m-%d)
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          # Check ALL states: a quest closed early tonight still counts as
          # today's quest (fallback crons must not resurrect it).
          # NOTE: this is an exact substring test via jq â€” GitHub's fuzzy
          # issue search tokenizes the query and once matched an unrelated
          # "15" (from `2m15s` in a cheatsheet), silently skipping creation.
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues?labels=daily-quest&state=all&per_page=50" \
            --jq "[.[] | select((.body // \"\") | contains(\"irongraph:quest date=$TODAY\"))] | length")
          echo "exists=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Create quest issue
        if: steps.dedupe.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m irongraph.quest --json --date "${{ steps.dedupe.outputs.today }}" > quest.json
          python - <<'PY'
          import json
          q = json.load(open("quest.json"))
          open("quest_title.txt", "w").write(q["title"])
          open("quest_body.md", "w").write(q["body"])
          PY
          gh label create daily-quest --color F78166 --description "Nightly workout quest" --force
          gh label create workout --color 3FB950 --description "Workout log" --force
          gh label create awaiting-log --color E3B341 --description "Waiting for workout data" --force
          gh label create log-workout --color 2EA043 --description "Trigger workout ingestion" --force
          gh label create needs-fix --color D73A49 --description "Workout data needs correction" --force
          gh issue create \
            --title "$(cat quest_title.txt)" \
            --body-file quest_body.md \
            --label daily-quest,workout,awaiting-log \
            --assignee "${{ github.repository_owner }}"
